<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeanPlay</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <header>
    <div class="logo" onclick="goHome()">
      <svg viewBox="0 0 32 32">
        <rect x="2" y="6" width="28" height="20" rx="4" fill="var(--red)" />
        <polygon points="13,11 13,21 22,16" fill="#fff" />
      </svg>
      <span>Lean<b>Play</b></span>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search" onkeydown="if(event.key==='Enter')filter()">
      <button onclick="filter()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg></button>
    </div>
    <div class="avatar">L</div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-item active" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        Home
      </div>
      <div class="sidebar-item" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 7V4h2V2H4v2h2v3H2v14h20V7h-4zM8 4h8v3H8V4zm10 15H6V9h12v10z" />
        </svg>
        Library
      </div>
      <hr>
      <div class="sidebar-item" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="10" />
          <polygon points="10,8 16,12 10,16" />
        </svg>
        Videos
      </div>
    </aside>
    <div class="content" id="app">
      <div class="loading">Loading videos...</div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>

</html>
